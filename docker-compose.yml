services:
  answer:
    image: git.pku.edu.cn/2200011523/answer:${IMAGE_TAG:-latest}
    container_name: answer
    restart: unless-stopped
    ports:
      - "9080:80"
    volumes:
      - ./data:/data
    environment:
      - TZ=Asia/Shanghai
      - AUTO_INSTALL=true
      - DB_TYPE=sqlite3
      - DB_FILE=/data/answer.db
      - LANGUAGE=zh_CN
      - SITE_NAME=${SITE_NAME:-Test Forum}
      - SITE_URL=${SITE_URL:-http://localhost:9080}
      - CONTACT_EMAIL=${CONTACT_EMAIL:-admin@example.com}
      - ADMIN_NAME=${ADMIN_NAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123456}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@example.com}
    networks:
      - answer-network

networks:
  answer-network:
    driver: bridge
