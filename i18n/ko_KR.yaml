                    <small><a href='{{.UnsubscribeUrl}}'>구독 취소</a></small>
            title:
                other: '[{{.SiteName}}] 새 질문: {{.QuestionTitle}}'
        pass_reset:
            body:
                other: |-
                    누군가가 {{.SiteName}} 에서 당신의 비밀번호 재설정을 요청했습니다.<br><br>

                    당신이 요청하지 않았다면 이 이메일을 무시해도 됩니다.<br><br>

