        change_email:
            body:
                other: |-
                    다음 링크를 클릭하여 {{.SiteName}} 의 새 이메일 주소를 확인하세요:<br>
                    <a href='{{.ChangeEmailUrl}}' target='_blank'>{{.ChangeEmailUrl}}</a><br><br>

                    이 변경을 요청하지 않았다면 이 이메일을 무시하세요.<br><br>

                    --<br>
                    참고: 이것은 자동 시스템 이메일입니다. 응답해도 확인되지 않으므로 이 메시지에 회신하지 마세요.
            title:
                other: '[{{.SiteName}}] 새 이메일 주소 확인'
        invited_you_to_answer:
            body:
                other: |-
                    <a href='{{.InviteUrl}}'>{{.QuestionTitle}}</a><br><br>

                    {{.DisplayName}}:<br>
                    <blockquote>답변을 아실 것 같습니다.</blockquote><br>
                    <a href='{{.InviteUrl}}'>{{.SiteName}} 에서 보기</a><br><br>

                    --<br>
                    참고: 이것은 자동 시스템 이메일입니다. 응답해도 확인되지 않으므로 이 메시지에 회신하지 마세요.<br><br>

                    <small><a href='{{.UnsubscribeUrl}}'>구독 취소</a></small>
            title:
                other: '[{{.SiteName}}] {{.DisplayName}} 님이 답변을 요청했습니다'
        new_answer:
            body:
                other: |-
                    <a href='{{.AnswerUrl}}'>{{.QuestionTitle}}</a><br><br>

                    {{.DisplayName}}:<br>
                    <blockquote>{{.AnswerSummary}}</blockquote><br>
                    <a href='{{.AnswerUrl}}'>{{.SiteName}} 에서 보기</a><br><br>

