    email_tpl:
        change_email:
            body:
                other: |-
                    Підтвердьте свою нову адресу електронної пошти для {{.SiteName}} натиснувши на наступне посилання:<br>
                    <a href='{{.ChangeEmailUrl}}' target='_blank'>{{.ChangeEmailUrl}}</a><br><br>

                    Якщо ви не запитували цю зміну, будь ласка, ігноруйте цей лист.<br><br>

                    --<br>
                    Примітка: Це автоматичний системний електронний лист, будь ласка, не відповідайте на це повідомлення, оскільки ваша відповідь не буде побачена.
            title:
                other: '[{{.SiteName}}] Підтвердіть нову адресу електронної пошти'
        invited_you_to_answer:
            body:
                other: |-
                    <a href='{{.InviteUrl}}'>{{.QuestionTitle}}</a><br><br>

                    {{.DisplayName}}:<br>
                    <blockquote>Думаю, ви можете знати відповідь.</blockquote><br>
                    <a href='{{.InviteUrl}}'>Переглянути на {{.SiteName}}</a><br><br>

                    --<br>
                    Примітка: Це автоматичний системний електронний лист, будь ласка, не відповідайте на це повідомлення, оскільки ваша відповідь не буде побачена.<br><br>

                    <small><a href='{{.UnsubscribeUrl}}'>Відписатися</a></small>
            title:
                other: '[{{.SiteName}}] {{.DisplayName}} запросив(-ла) вас відповісти'
        new_answer:
            body:
                other: |-
                    <a href='{{.AnswerUrl}}'>{{.QuestionTitle}}</a><br><br>

                    {{.DisplayName}}:<br>
                    <blockquote>{{.AnswerSummary}}</blockquote><br>
                    <a href='{{.AnswerUrl}}'>Переглянути на {{.SiteName}}</a><br><br>

                    --<br>
                    Примітка: Це автоматичний системний електронний лист, будь ласка, не відповідайте на це повідомлення, оскільки ваша відповідь не буде побачена.<br><br>

                    <small><a href='{{.UnsubscribeUrl}}'>Відписатися</a></small>
            title:
                other: '[{{.SiteName}}] {{.DisplayName}} відповів(-ла) на ваше запитання'
        new_comment:
            body:
                other: |-
                    <a href='{{.CommentUrl}}'>{{.QuestionTitle}}</a><br><br>

                    {{.DisplayName}}:<br>
                    <blockquote>{{.CommentSummary}}</blockquote><br>
                    <a href='{{.CommentUrl}}'>Переглянути на {{.SiteName}}</a><br><br>

                    --<br>
                    Примітка: Це автоматичний системний електронний лист, будь ласка, не відповідайте на це повідомлення, оскільки ваша відповідь не буде побачена.<br><br>

                    <small><a href='{{.UnsubscribeUrl}}'>Відписатися</a></small>
            title:
                other: '[{{.SiteName}}] {{.DisplayName}} прокоментували ваш допис'
        new_question:
            body:
                other: |-
                    <a href='{{.QuestionUrl}}'>{{.QuestionTitle}}</a><br>
                    <small>{{.Tags}}</small><br><br>

                    --<br>
                    Note: This is an automatic system email, please do not reply to this message as your response will not be seen.<br><br>

                    <small><a href='{{.UnsubscribeUrl}}'>Unsubscribe</a></small>
            title:
                other: '[{{.SiteName}}] Нове питання: {{.QuestionTitle}}'
        pass_reset:
            body:
                other: |-
                    Хтось попросив скинути ваш пароль на {{.SiteName}}.<br><br>

                    Якщо це не ви, можете сміливо ігнорувати цей лист.<br><br>

                    Перейдіть за наступним посиланням, щоб вибрати новий пароль:<br>
                    <a href='{{.PassResetUrl}}' target='_blank'>{{.PassResetUrl}}</a>
                    <br><br>

                    --<br>
                    Примітка: Це автоматичний системний електронний лист, будь ласка, не відповідайте на це повідомлення, оскільки ваша відповідь не буде побачена.
            title:
                other: '[{{.SiteName }}] Скидання пароля'
        register:
            body:
                other: |-
                    Ласкаво просимо до {{.SiteName}}!<br><br>

                    Перейдіть за наступним посиланням, щоб підтвердити та активувати свій новий обліковий запис:<br>
                    <a href='{{.RegisterUrl}}' target='_blank'>{{.RegisterUrl}}</a><br><br>

                    Якщо наведене вище посилання не відкривається, спробуйте скопіювати і вставити його в адресний рядок вашого веб-браузера.
                    <br><br>

                    --<br>
                    Примітка: Це автоматичний системний електронний лист, будь ласка, не відповідайте на це повідомлення, оскільки ваша відповідь не буде побачена.
            title:
                other: '[{{.SiteName}}] Підтвердьте свій новий обліковий запис'
        test:
            body:
                other: |-
                    Це тестовий електронний лист.
                    <br><br>

                    --<br>
                    Примітка: Це автоматичний системний електронний лист, будь ласка, не відповідайте на це повідомлення, оскільки ваша відповідь не буде побачена.
            title:
                other: '[{{.SiteName}}] Тестовий електронний лист'
