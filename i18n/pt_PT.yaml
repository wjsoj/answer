    email_tpl:
        change_email:
            body:
                other: |-
                    Confirme seu novo endereço de e-mail para {{.SiteName}} clicando no seguinte link:<br>
                    <a href='{{.ChangeEmailUrl}}' target='_blank'>{{.ChangeEmailUrl}}</a><br><br>

                    Se você não solicitou esta alteração, por favor, ignore este email.<br><br>

                    --<br>
                    Nota: Este é um e-mail automático do sistema, por favor, não responda a esta mensagem, pois a sua resposta não será vista.
            title:
                other: '[{{.SiteName}}] Confirme seu novo endereço de e-mail'
        invited_you_to_answer:
            body:
                other: |-
                    <a href='{{.InviteUrl}}'>{{.QuestionTitle}}</a><br><br>

                    {{.DisplayName}}:<br>
                    <blockquote>acho que você pode saber a resposta.</blockquote><br>
                    <a href='{{.InviteUrl}}'>Visualizar na {{.SiteName}}</a><br><br>

                    --<br>
                    Nota: Este é um e-mail de sistema automático, por favor, não responda a esta mensagem, pois a sua resposta não será vista.<br><br>

                    <small><a href='{{.UnsubscribeUrl}}'>Cancelar Inscrição</a></small>
            title:
                other: '[{{.SiteName}}] {{.DisplayName}} convidou-lhe para responder'
        new_answer:
            body:
                other: |-
                    <a href='{{.AnswerUrl}}'>{{.QuestionTitle}}</a><br><br>

                    {{.DisplayName}}:<br>
                    <blockquote>{{.AnswerSummary}}</blockquote><br>
                    <a href='{{.AnswerUrl}}'>Visualizar no {{.SiteName}}</a><br><br>

                    --<br>
                    Nota: Este é um e-mail de sistema automático, por favor, não responda a esta mensagem, pois a sua resposta não será vista.<br><br>

                    <small><a href='{{.UnsubscribeUrl}}'>Cancelar inscrição</a></small>
            title:
                other: '[{{.SiteName}}] {{.DisplayName}} respondeu à sua pergunta'
        new_comment:
            body:
                other: |-
                    <a href='{{.CommentUrl}}'>{{.QuestionTitle}}</a><br><br>

                    {{.DisplayName}}:<br>
                    <blockquote>{{.CommentSummary}}</blockquote><br>
                    <a href='{{.CommentUrl}}'>Visualizar no {{.SiteName}}</a><br><br>

                    --<br>
                    Nota: Este é um e-mail de sistema automático, por favor, não responda a esta mensagem, pois a sua resposta não será vista.<br><br>

                    <small><a href='{{.UnsubscribeUrl}}'>Cancelar inscrição</a></small>
            title:
                other: '[{{.SiteName}}] {{.DisplayName}} comentou em sua publicação'
        new_question:
            body:
                other: |-
                    <a href='{{.QuestionUrl}}'>{{.QuestionTitle}}</a><br>
                    <small>{{.Tags}}</small><br><br>

                    --<br>
                    Note: This is an automatic system email, please do not reply to this message as your response will not be seen.<br><br>

                    <small><a href='{{.UnsubscribeUrl}}'>Unsubscribe</a></small>
            title:
                other: '[{{.SiteName}}] Nova pergunta: {{.QuestionTitle}}'
        pass_reset:
            body:
                other: |-
                    Alguém pediu para redefinir a sua senha em {{.SiteName}}.<br><br>

                    Se não foi você, você pode ignorar este e-mail.<br><br>

                    Clique no seguinte link para escolher uma nova senha:<br>
                    <a href='{{.PassResetUrl}}' target='_blank'>{{.PassResetUrl}}</a><br><br>

                    --<br>
                    Nota: Este é um e-mail de sistema automático, por favor, não responda a esta mensagem, pois a sua resposta não será vista.
            title:
                other: '[{{.SiteName }}] Redefinição de senha'
        register:
            body:
                other: |-
                    Bem-vindo a {{.SiteName}}!<br><br>

                    Clique no seguinte link para confirmar e ativar sua nova conta:<br>
                    <a href='{{.RegisterUrl}}' target='_blank'>{{.RegisterUrl}}</a><br><br>

                    Se o link acima não for clicável, tente copiá-lo e colá-lo na barra de endereços do seu navegador web.
                    <br><br>

                    --<br>
                    Nota: Este é um e-mail de sistema automático. por favor, não responda a esta mensagem, pois a sua resposta não será vista.
            title:
                other: '[{{.SiteName}}] Confirme seu novo endereço de e-mail'
        test:
            body:
                other: |-
                    Este é um e-mail de teste.
                    <br><br>

                    --<br>
                    Nota: Este é um e-mail automático do sistema, por favor, não responda a esta mensagem, pois a sua resposta não será vista.
            title:
                other: '[{{.SiteName}}] E-mail de teste'
