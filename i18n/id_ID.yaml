    email_tpl:
        change_email:
            body:
                other: |-
                    Confirm your new email address for {{.SiteName}} by clicking on the following link:<br>
                    <a href='{{.ChangeEmailUrl}}' target='_blank'>{{.ChangeEmailUrl}}</a><br><br>

                    If you did not request this change, please ignore this email.<br><br>

                    --<br>
                    Note: This is an automatic system email, please do not reply to this message as your response will not be seen.
            title:
                other: '[{{.SiteName}}] Confirm your new email address'
        invited_you_to_answer:
            body:
                other: |-
                    <a href='{{.InviteUrl}}'>{{.QuestionTitle}}</a><br><br>

                    {{.DisplayName}}:<br>
                    <blockquote>I think you may know the answer.</blockquote><br>
                    <a href='{{.InviteUrl}}'>View it on {{.SiteName}}</a><br><br>

                    --<br>
                    Note: This is an automatic system email, please do not reply to this message as your response will not be seen.<br><br>

                    <small><a href='{{.UnsubscribeUrl}}'>Unsubscribe</a></small>
            title:
                other: '[{{.SiteName}}] {{.DisplayName}} invited you to answer'
        new_answer:
            body:
                other: |-
                    <a href='{{.AnswerUrl}}'>{{.QuestionTitle}}</a><br><br>

                    {{.DisplayName}}:<br>
                    <blockquote>{{.AnswerSummary}}</blockquote><br>
                    <a href='{{.AnswerUrl}}'>View it on {{.SiteName}}</a><br><br>

                    --<br>
                    Note: This is an automatic system email, please do not reply to this message as your response will not be seen.<br><br>

                    <small><a href='{{.UnsubscribeUrl}}'>Unsubscribe</a></small>
            title:
                other: '[{{.SiteName}}] {{.DisplayName}} answered your question'
        new_comment:
            body:
                other: |-
                    <a href='{{.CommentUrl}}'>{{.QuestionTitle}}</a><br><br>

                    {{.DisplayName}}:<br>
                    <blockquote>{{.CommentSummary}}</blockquote><br>
                    <a href='{{.CommentUrl}}'>View it on {{.SiteName}}</a><br><br>

                    --<br>
                    Note: This is an automatic system email, please do not reply to this message as your response will not be seen.<br><br>

                    <small><a href='{{.UnsubscribeUrl}}'>Unsubscribe</a></small>
            title:
                other: '[{{.SiteName}}] {{.DisplayName}} commented on your post'
        new_question:
            body:
                other: |-
                    <a href='{{.QuestionUrl}}'>{{.QuestionTitle}}</a><br>
                    <small>{{.Tags}}</small><br><br>

                    --<br>
                    Note: This is an automatic system email, please do not reply to this message as your response will not be seen.<br><br>

                    <small><a href='{{.UnsubscribeUrl}}'>Unsubscribe</a></small>
            title:
                other: '[{{.SiteName}}] New question: {{.QuestionTitle}}'
        pass_reset:
            body:
                other: |-
                    Somebody asked to reset your password on {{.SiteName}}.<br><br>

                    If it was not you, you can safely ignore this email.<br><br>

                    Click the following link to choose a new password:<br>
                    <a href='{{.PassResetUrl}}' target='_blank'>{{.PassResetUrl}}</a>
                    <br><br>

                    --<br>
                    Note: This is an automatic system email, please do not reply to this message as your response will not be seen.
            title:
                other: '[{{.SiteName }}] Password reset'
        register:
            body:
                other: |-
                    Welcome to {{.SiteName}}!<br><br>

                    Click the following link to confirm and activate your new account:<br>
                    <a href='{{.RegisterUrl}}' target='_blank'>{{.RegisterUrl}}</a><br><br>

                    If the above link is not clickable, try copying and pasting it into the address bar of your web browser.
                    <br><br>

                    --<br>
                    Note: This is an automatic system email, please do not reply to this message as your response will not be seen.
            title:
                other: '[{{.SiteName}}] Confirm your new account'
        test:
            body:
                other: |-
                    This is a test email.
                    <br><br>

                    --<br>
                    Note: This is an automatic system email, please do not reply to this message as your response will not be seen.
            title:
                other: '[{{.SiteName}}] Test Email'
