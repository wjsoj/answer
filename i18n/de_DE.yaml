    email_tpl:
        change_email:
            body:
                other: |-
                    Bestätigen Sie Ihre neue E-Mail-Adresse für {{.SiteName}} indem Sie auf den folgenden Link klicken:<br>
                    <a href='{{.ChangeEmailUrl}}' target='_blank'>{{.ChangeEmailUrl}}</a><br><br>

                    Wenn Sie diese Änderung nicht angefordert haben bitte diese E-Mail ignorieren.<br><br>

                    --<br>
                    Hinweis: Dies ist eine automatische System-E-Mail, Bitte antworten Sie nicht auf diese Nachricht, da Ihre Antwort nicht angezeigt wird.
            title:
                other: '[{{.SiteName}}] Bestätige deine neue E-Mail-Adresse'
        invited_you_to_answer:
            body:
                other: |-
                    <a href='{{.InviteUrl}}'>{{.QuestionTitle}}</a><br><br>

                    {{.DisplayName}}:<br>
                    <blockquote>Ich denke, Sie kennen die Antwort.</blockquote><br>
                    <a href='{{.InviteUrl}}'> {{.SiteName}}</a><br><br>

                    --<br>
                    Hinweis: Dies ist eine automatische System-E-Mail, Bitte antworten Sie nicht auf diese Nachricht, da Ihre Antwort nicht angezeigt wird.<br><br>

                    <small><a href='{{.UnsubscribeUrl}}'>Abmelden</a></small>
            title:
                other: '[{{.SiteName}}] {{.DisplayName}} hat dich eingeladen zu antworten'
        new_answer:
            body:
                other: |-
                    <a href='{{.AnswerUrl}}'>{{.QuestionTitle}}</a><br><br>

                    {{.DisplayName}}:<br>
                    <blockquote>{{.AnswerSummary}}</blockquote><br>

                    <a href='{{.AnswerUrl}}'>Auf {{.SiteName}} anschauen</a><br><br>

                    --<br>
                    Hinweis: Dies ist eine automatische System-E-Mail, bitte antworten Sie nicht auf diese Nachricht, da Ihre Antwort nicht angezeigt wird.<br><br>

                    <small><a href='{{.UnsubscribeUrl}}'>Abmelden</a></small>
            title:
                other: '[{{.SiteName}}] {{.DisplayName}} hat deine Frage beantwortet'
        new_comment:
            body:
                other: |-
                    <a href='{{.CommentUrl}}'>{{.QuestionTitle}}</a><br><br>

                    {{.DisplayName}}:<br>
                    <blockquote>{{.CommentSummary}}</blockquote><br>

                    <a href='{{.CommentUrl}}'>Auf {{.SiteName}} anschauen</a><br><br>

                    --<br>
                    Hinweis: Dies ist eine automatische System-E-Mail, Bitte antworten Sie nicht auf diese Nachricht, da Ihre Antwort nicht angezeigt wird.<br><br>

                    <small><a href='{{.UnsubscribeUrl}}'>Abmelden</a></small>
            title:
                other: '[{{.SiteName}}] {{.DisplayName}} hat deinen Beitrag kommentiert'
        new_question:
            body:
                other: |-
                    <a href='{{.QuestionUrl}}'>{{.QuestionTitle}}</a><br>
                    <small>{{.Tags}}</small><br><br>

                    --<br>
                    Hinweis: Dies ist eine automatische Systemnachricht, bitte antworten Sie nicht darauf. Antworten werden nicht gelesen oder bearbeitet.<br><br>

                    <small><a href='{{.UnsubscribeUrl}}'>Benachrichtigung abbestellen</a></small>
            title:
                other: '[{{.SiteName}}] Neue Frage: {{.QuestionTitle}}'
        pass_reset:
            body:
                other: |-
                    Jemand bat darum, Ihr Passwort auf {{.SiteName}}zurückzusetzen.<br><br>

                    Wenn Sie es nicht waren, können Sie diese E-Mail sicher ignorieren.<br><br>

                    Klicken Sie auf den folgenden Link, um ein neues Passwort auszuwählen:<br>
                    <a href='{{.PassResetUrl}}' target='_blank'>{{.PassResetUrl}}</a>

                    <br><br>

                    --<br>
                    Hinweis: Dies ist eine automatische System-E-Mail, Bitte antworten Sie nicht auf diese Nachricht, da Ihre Antwort nicht angezeigt wird.
            title:
                other: '[{{.SiteName }}] Passwort zurücksetzen'
        register:
            body:
                other: |-
                    Willkommen in {{.SiteName}}!<br><br>

                    Klicken Sie auf den folgenden Link, um Ihr neues Konto zu bestätigen und zu aktivieren:<br>
                    <a href='{{.RegisterUrl}}' target='_blank'>{{.RegisterUrl}}</a><br><br>

                    Wenn der obige Link nicht anklickbar ist kopieren und in die Adressleiste Ihres Webbrowsers einfügen.
                    <br><br>

                    --<br>
                    Hinweis: Dies ist eine automatische System-E-Mail, Bitte antworten Sie nicht auf diese Nachricht, da Ihre Antwort nicht sichtbar ist.
            title:
                other: '[{{.SiteName}}] Bestätige dein neues Konto'
        test:
