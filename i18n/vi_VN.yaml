    email_tpl:
        change_email:
            body:
                other: |-
                    Xác nhận địa chỉ email mới của bạn cho {{.SiteName}} bằng cách nhấp vào liên kết sau:<br>
                    <a href='{{.ChangeEmailUrl}}' target='_blank'>{{.ChangeEmailUrl}}</a><br><br>

                    Nếu bạn không yêu cầu thay đổi này, vui lòng bỏ qua email này.<br><br>

                    --<br>
                    Lưu ý: Đây là email hệ thống tự động, vui lòng không trả lời tin nhắn này vì chúng tôi sẽ không nhìn thấy phản hồi của bạn.
            title:
                other: '[{{.SiteName}}] Xác nhận địa chỉ email mới của bạn'
        invited_you_to_answer:
            body:
                other: |-
                    <a href='{{.InviteUrl}}'>{{.QuestionTitle}}</a><br><br>

                    {{.DisplayName}}:<br>
                    <blockquote>Tôi nghĩ bạn có thể biết câu trả lời.</blockquote><br>
                    <a href='{{.InviteUrl}}'>Xem trên {{.SiteName}}</a><br><br>

                    --<br>
                    Lưu ý: Đây là email hệ thống tự động, vui lòng không trả lời thư này vì chúng tôi sẽ không nhìn thấy phản hồi của bạn.<br><br>

                    <small><a href='{{.UnsubscribeUrl}}'>Hủy đăng ký</a></small>
            title:
                other: '[{{.SiteName}}] {{.DisplayName}} mời bạn trả lời'
        new_answer:
            body:
                other: |-
                    <a href='{{.AnswerUrl}}'>{{.QuestionTitle}}</a><br><br>

                    {{.DisplayName}}:<br>
                    <blockquote>{{.AnswerSummary}}</blockquote><br>
                    <a href='{{.AnswerUrl}}'>Xem trên {{.SiteName}}</a><br><br>

                    --<br>
                    Lưu ý: Đây là email hệ thống tự động, vui lòng không trả lời thư này vì chúng tôi sẽ không nhìn thấy phản hồi của bạn.<br><br>

                    <small><a href='{{.UnsubscribeUrl}}'>Hủy đăng ký</a></small>
            title:
                other: '[{{.SiteName}}] {{.DisplayName}} đã trả lời câu hỏi của bạn'
        new_comment:
            body:
                other: |-
                    <a href='{{.CommentUrl}}'>{{.QuestionTitle}}</a><br><br>

                    {{.DisplayName}}:<br>
                    <blockquote>{{.CommentSummary}}</blockquote><br>
                    <a href='{{.CommentUrl}}'>Xem trên {{.SiteName}}</a><br><br>

                    --<br>
                    Lưu ý: Đây là email hệ thống tự động, vui lòng không trả lời thư này vì chúng tôi sẽ không nhìn thấy phản hồi của bạn.<br><br>

                    <small><a href='{{.UnsubscribeUrl}}'>Hủy đăng ký</a></small>
            title:
                other: '[{{.SiteName}}] {{.DisplayName}} đã bình luận về bài đăng của bạn'
        new_question:
            body:
                other: |-
                    <a href='{{.QuestionUrl}}'>{{.QuestionTitle}}</a><br>
                    <small>{{.Tags}}</small><br><br>

                    --<br>
                    Note: This is an automatic system email, please do not reply to this message as your response will not be seen.<br><br>

                    <small><a href='{{.UnsubscribeUrl}}'>Unsubscribe</a></small>
            title:
                other: '[{{.SiteName}}] Câu hỏi mới: {{.QuestionTitle}}'
        pass_reset:
            body:
                other: |-
                    Ai đó đã yêu cầu đặt lại mật khẩu của bạn trên {{.SiteName}}.<br><br>

                    Nếu người đó không phải là bạn thì bạn có thể yên tâm bỏ qua email này.<br><br>

                    Nhấp vào liên kết sau để chọn mật khẩu mới:<br>
                    <a href='{{.PassResetUrl}}' target='_blank'>{{.PassResetUrl}}</a>
                    <br><br>

                    --<br>
                    Lưu ý: Đây là email hệ thống tự động, vui lòng không trả lời tin nhắn này vì chúng tôi sẽ không nhìn thấy phản hồi của bạn.
            title:
                other: '[{{.SiteName}}] Đặt lại mật khẩu'
        register:
            body:
                other: |-
                    Chào mừng bạn đến với {{.SiteName}}!<br><br>

                    Nhấp vào liên kết sau để xác nhận và kích hoạt tài khoản mới của bạn:<br>
                    <a href='{{.RegisterUrl}}' target='_blank'>{{.RegisterUrl}}</a><br><br>

                    Nếu liên kết trên không nhấp vào được, hãy thử sao chép và dán nó vào thanh địa chỉ trình duyệt web của bạn.
                    <br><br>

                    --<br>
                    Lưu ý: Đây là email hệ thống tự động, vui lòng không trả lời tin nhắn này vì chúng tôi sẽ không nhìn thấy phản hồi của bạn.
            title:
                other: '[{{.SiteName}}] Xác nhận tài khoản mới của bạn'
        test:
            body:
                other: |-
                    Đây là một email thử nghiệm.
                    <br><br>

                    --<br>
                    Lưu ý: Đây là email hệ thống tự động, vui lòng không trả lời tin nhắn này vì chúng tôi sẽ không nhìn thấy phản hồi của bạn.
