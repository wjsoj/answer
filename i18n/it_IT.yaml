    email_tpl:
        change_email:
            body:
                other: |-
                    Conferma il tuo nuovo indirizzo email per {{.SiteName}} cliccando sul seguente link:<br>
                    <a href='{{.ChangeEmailUrl}}' target='_blank'>{{.ChangeEmailUrl}}</a><br><br>

                    Se non hai richiesto questa modifica, ignora questa email.<br><br>

                    --<br>
                    Nota: Si tratta di un'email di sistema automatica, non rispondere a questo messaggio perché la tua risposta non verrà visualizzata.
            title:
                other: '[{{.SiteName}}] Conferma il tuo nuovo indirizzo email'
        invited_you_to_answer:
            body:
                other: |-
                    <a href='{{.InviteUrl}}'>{{.QuestionTitle}}</a><br><br>

                    {{.DisplayName}}:<br>
                    <blockquote>Penso che tu possa sapere la risposta.</blockquote><br>
                    <a href='{{.InviteUrl}}'>Visualizza su {{.SiteName}}</a><br><br>

                    --<br>
                    Nota: Questa è un'email di sistema automatica, non rispondere a questo messaggio perché la tua risposta non verrà visualizzata.<br><br>

                    <small><a href='{{.UnsubscribeUrl}}'>Cancellazione</a></small>
            title:
                other: '[{{.SiteName}}] {{.DisplayName}} ti ha invitato a rispondere'
        new_answer:
            body:
                other: |-
                    <a href='{{.AnswerUrl}}'>{{.QuestionTitle}}</a><br><br>

                    {{.DisplayName}}:<br>
                    <blockquote>{{.AnswerSummary}}</blockquote><br>
                    <a href='{{.AnswerUrl}}'>Visualizza su {{.SiteName}}</a><br><br>

                    --<br>
                    Nota: Si tratta di un'email di sistema automatica, non rispondere a questo messaggio perché la tua risposta non verrà visualizzata.<br><br>

                    <small><a href='{{.UnsubscribeUrl}}'>Cancellazione</a></small>
            title:
                other: '[{{.SiteName}}] {{.DisplayName}} ha risposto alla tua domanda'
        new_comment:
            body:
                other: |-
                    <a href='{{.CommentUrl}}'>{{.QuestionTitle}}</a><br><br>

                    {{.DisplayName}}:<br>
                    <blockquote>{{.CommentSummary}}</blockquote><br>
                    <a href='{{.CommentUrl}}'>Visualizza su {{.SiteName}}</a><br><br>

                    --<br>
                    Nota: Si tratta di un'email di sistema automatica, non rispondere a questo messaggio perché la tua risposta non verrà visualizzata.<br><br>

                    <small><a href='{{.UnsubscribeUrl}}'>Cancellazione</a></small>
            title:
                other: '[{{.SiteName}}] {{.DisplayName}} ha commentato il tuo post'
        new_question:
            body:
                other: |-
                    <a href='{{.QuestionUrl}}'>{{.QuestionTitle}}</a><br>
                    <small>{{.Tags}}</small><br><br>

                    --<br>
                    Nota: Si tratta di un'email di sistema automatica, non rispondere a questo messaggio perché la tua risposta non sarà visualizzata.<br><br>

                    <small><a href='{{.UnsubscribeUrl}}'>Cancellati</a></small>
            title:
                other: '[{{.SiteName}}] Nuova domanda: {{.QuestionTitle}}'
        pass_reset:
            body:
                other: |-
                    Qualcuno ha chiesto di reimpostare la tua password su {{.SiteName}}.<br><br>

                    Se non sei tu, puoi tranquillamente ignorare questa email.<br><br>

                    Clicca sul seguente link per scegliere una nuova password:<br>
                    <a href='{{.PassResetUrl}}' target='_blank'>{{.PassResetUrl}}</a>
                    <br><br>

                    --<br>
                    Nota: Si tratta di un'email di sistema automatica, non rispondere a questo messaggio perché la tua risposta non verrà visualizzata.
            title:
                other: '[{{.SiteName }}] Reimpostazione della password'
        register:
            body:
                other: |-
                    Benvenuto in {{.SiteName}}!<br><br>

                    Clicca il seguente link per confermare e attivare il tuo nuovo account:<br>
                    <a href='{{.RegisterUrl}}' target='_blank'>{{.RegisterUrl}}</a><br><br>

                    Se il link di cui sopra non è cliccabile, prova a copiarlo e incollarlo nella barra degli indirizzi del tuo browser web.
                    <br><br>

                    --<br>
                    Nota: Si tratta di un'email di sistema automatica, non rispondere a questo messaggio perché la tua risposta non verrà visualizzata.
            title:
                other: '[{{.SiteName}}] Conferma il tuo nuovo account'
        test:
            body:
                other: |-
                    Questa è una email di prova.
                    <br><br>

                    --<br>
                    Nota: Questa è un'email di sistema automatica, non rispondere a questo messaggio perché la tua risposta non verrà visualizzata.
            title:
                other: '[{{.SiteName}}] Email di prova'
