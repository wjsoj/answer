    email_tpl:
        change_email:
            body:
                other: |-
                    Confirme su nueva dirección de correo electrónico para {{.SiteName}} haciendo clic en el siguiente enlace:<br>
                    <a href='{{.ChangeEmailUrl}}' target='_blank'>{{.ChangeEmailUrl}}</a><br><br>

                    Si no solicitó este cambio, por favor, ignore este mensaje.<br><br>

                    --<br>
                    Nota: Este es un mensaje automático, por favor, no responda a este mensaje ya que su respuesta no será leída.
            title:
                other: '[{{.SiteName}}] Confirma tu nueva dirección de correo'
        invited_you_to_answer:
            body:
                other: |-
                    <a href='{{.InviteUrl}}'>{{.QuestionTitle}}</a><br><br>

                    {{.DisplayName}}:<br>
                    <blockquote>Es posible que conozca la respuesta.</blockquote><br>
                    <a href='{{.InviteUrl}}'>Verlo en {{.SiteName}}</a><br><br>

                    --<br>
                    Nota: Este es un mensaje automático, por favor, no responda a este mensaje ya que su respuesta no será leída.<br><br>

                    <small><a href='{{.UnsubscribeUrl}}'>Darse de baja</a></small>
            title:
                other: '[{{.SiteName}}] {{.DisplayName}} te invitó a responder'
        new_answer:
            body:
                other: |-
                    <a href='{{.AnswerUrl}}'>{{.QuestionTitle}}</a><br><br>

                    {{.DisplayName}}:<br>
                    <blockquote>{{.AnswerSummary}}</blockquote><br>
                    <a href='{{.AnswerUrl}}'>Verlo en {{.SiteName}}</a><br><br>

                    --<br>
                    Nota: Este es un mensaje automático, por favor, no responda a este mensaje ya que su respuesta no será leída.<br><br>

                    <small><a href='{{.UnsubscribeUrl}}'>Darse de baja</a></small>
            title:
                other: '[{{.SiteName}}] {{.DisplayName}} respondió tu pregunta'
        new_comment:
            body:
                other: |-
                    <a href='{{.CommentUrl}}'>{{.QuestionTitle}}</a><br><br>

                    {{.DisplayName}}:<br>
                    <blockquote>{{.CommentSummary}}</blockquote><br>
                    <a href='{{.CommentUrl}}'>Verlo en {{.SiteName}}</a><br><br>

                    --<br>
                    Nota: Este es un mensaje automático, por favor, no responda a este mensaje ya que su respuesta no será leída.<br><br>

                    <small><a href='{{.UnsubscribeUrl}}'>Darse de baja</a></small>
            title:
                other: '[{{.SiteName}}] {{.DisplayName}} comentó en tu publicación'
        new_question:
            body:
                other: |-
                    <a href='{{.QuestionUrl}}'>{{.QuestionTitle}}</a><br>
                    <small>{{.Tags}}</small><br><br>

                    --<br>
                    Note: This is an automatic system email, please do not reply to this message as your response will not be seen.<br><br>

                    <small><a href='{{.UnsubscribeUrl}}'>Unsubscribe</a></small>
            title:
                other: '[{{.SiteName}}] Nueva pregunta: {{.QuestionTitle}}'
        pass_reset:
            body:
                other: |-
                    Se solicitó el restablecimiento de su contraseña en {{.SiteName}}.<br><br>

                    Si no lo solicitó, puede ignorar este mensaje.<br><br>

                    Haga clic en el siguiente enlace para generar una nueva contraseña:<br>
                    <a href='{{.PassResetUrl}}' target='_blank'>{{.PassResetUrl}}</a>
                    <br><br>

                    --<br>
                    Nota: Este es un mensaje automático, por favor, no responda a este mensaje ya que su respuesta no será leída.
            title:
                other: '[{{.SiteName }}] Reestablecimiento de contraseña'
        register:
            body:
                other: |-
                    ¡Bienvenido a {{.SiteName}}!<br><br>

                    Haga clic en el siguiente enlace y active su nueva cuenta:<br>
                    <a href='{{.RegisterUrl}}' target='_blank'>{{.RegisterUrl}}</a><br><br>

                    Si no puede hacer clic en el enlace anterior, intente copiando y pegando el enlace en la barra de dirección en su navegador web.<br><br>

                    --<br>
                    Nota: Este es un mensaje automático, por favor, no responda a este mensaje ya que su respuesta no será leída.
            title:
                other: '[{{.SiteName}}] Confirma tu nueva cuenta'
        test:
            body:
                other: |-
                    Este es un mensaje de prueba.
                    <br><br>

                    --<br>
                    Nota: Este es un mensaje automático, por favor, no responda a este mensaje ya que su respuesta no será leída.
            title:
                other: '[{{.SiteName}}] Correo de prueba'
