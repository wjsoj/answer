        change_email:
            body:
                other: 'Подтвердите свой новый адрес электронной почты для {{.SiteName}}, перейдя по следующей ссылке:<br> <a href=''{{.ChangeEmailUrl}}'' target=''_blank''>{{.ChangeEmailUrl}}</a><br><br> Если вы не запрашивали это изменение, пожалуйста, проигнорируйте это электронное письмо. <br><br> - <br> Примечание: Данное сообщение является автоматическим, отвечать на него не нужно.'
            title:
                other: '[{{.SiteName}}] Подтвердите новый адрес электронной почты'
        invited_you_to_answer:
            body:
                other: |-
                    <a href='{{.InviteUrl}}'>{{.QuestionTitle}}</a><br><br>

                    {{.DisplayName}}:<br>
                    <blockquote>Я думаю, что вы можете знать ответ.</blockquote><br>
                    <a href='{{.InviteUrl}}'>Открыть {{.SiteName}}</a><br><br>

                    --<br>
                    Примечание: Данное сообщение является автоматическим, отвечать на него не нужно.<br><br>

                    <small><a href='{{.UnsubscribeUrl}}'>Отписаться</a></small>
            title:
                other: '[{{.SiteName}}] {{.DisplayName}} приглашает вас в Answer'
        new_answer:
            body:
                other: |-
                    <a href='{{.AnswerUrl}}'>{{.QuestionTitle}}</a><br><br>

                    {{.DisplayName}}:<br>
                    <blockquote>{{.AnswerSummary}}</blockquote><br>
                    <a href='{{.AnswerUrl}}'>Открыть {{.SiteName}}</a><br><br>

                    --<br>
                    Примечание: Данное сообщение является автоматическим, отвечать на него не нужно.<br><br>

                    <small><a href='{{.UnsubscribeUrl}}'>Отписаться.</a></small>
            title:
                other: '[{{.SiteName}}] {{.DisplayName}} ответил на ваш вопрос'
        new_comment:
            body:
                other: |-
                    <a href='{{.CommentUrl}}'>{{.QuestionTitle}}</a><br><br>

                    {{.DisplayName}}:<br>
                    <blockquote>{{.CommentSummary}}</blockquote><br>
                    <a href='{{.CommentUrl}}'>Открыть {{.SiteName}}</a><br><br>

                    --<br>
                    Примечание: Данное сообщение является автоматическим, отвечать на него не нужно.<br><br>

                    <small><a href='{{.UnsubscribeUrl}}'>Отписаться</a></small>
            title:
                other: '[{{.SiteName}}] {{.DisplayName}} прокомментировал под вашей публикацией'
        new_question:
            body:
                other: |-
                    <a href='{{.QuestionUrl}}'>{{.QuestionTitle}}</a><br>
                    <small>{{.Tags}}</small><br><br>

                    --<br>
                    Note: This is an automatic system email, please do not reply to this message as your response will not be seen.<br><br>

                    <small><a href='{{.UnsubscribeUrl}}'>Unsubscribe</a></small>
            title:
                other: '[{{.SiteName}}] Новый вопрос: {{.QuestionTitle}}'
        pass_reset:
            body:
                other: |-
                    Кто-то попросил сбросить ваш пароль на {{.SiteName}}.<br><br>

                    Если это не вы, вы можете проигнорировать это письмо.<br><br>

                    Перейдите по следующей ссылке, чтобы выбрать новый пароль:<br>
                    <a href='{{.PassResetUrl}}' target='_blank'>{{.PassResetUrl}}</a>
                    <br><br>

                    --<br>
                    Примечание: Данное сообщение является автоматическим, отвечать на него не нужно.
            title:
                other: '[{{.SiteName }}] Пароль сброшен'
        register:
            body:
                other: |-
                    Добро пожаловать в {{.SiteName}}!<br><br>

                    Перейдите по следующей ссылке для подтверждения и активации вашей новой учетной записи:<br>
                    <a href='{{.RegisterUrl}}' target='_blank'>{{.RegisterUrl}}</a><br><br>

                    Если ссылка выше не нажата, попробуйте скопировать и вставить её в адресную строку вашего браузера.
                    <br><br>

                    --<br>
                    Примечание: Данное сообщение является автоматическим, отвечать на него не нужно.
            title:
                other: '[{{.SiteName}}] Подтвердите Ваш новый аккаунт'
        test:
            body:
                other: |-
                    Это тестовое сообщение.
                    <br><br>

                    --<br>
                    Примечание: Данное сообщение является автоматическим, отвечать на него не нужно.
            title:
                other: '[{{.SiteName}}] Проверочное электронное письмо'
