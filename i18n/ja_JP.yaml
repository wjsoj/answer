    email_tpl:
        change_email:
            body:
                other: |-
                    {{.SiteName}}の新しいメールアドレスを確認しリンクをクリックしてください。<br>
                    <a href='{{.ChangeEmailUrl}}' target='_blank'>{{.ChangeEmailUrl}}</a><br><br>

                    身に覚えがない場合はこのメールを無視してください。

                    --<br>
                    注: これはシステムからの自動メールです。このメッセージに返信しないでください。
            title:
                other: '[{{.SiteName}}] 新しいメールアドレスを確認してください'
        invited_you_to_answer:
            body:
                other: |
                    <a href='{{.InviteUrl}}'>{{.QuestionTitle}}</a><br><br>

                    {{.DisplayName}}:<br>
                    <blockquote>あなたなら答えを知っているかもしれません。</blockquote><br>
                    <a href='{{.InviteUrl}}'>{{.SiteName}}で確認</a><br><br>

                    --<br>
                    注: これはシステムからの自動メールです。このメッセージに返信しないでください。<br><br>

                    <small><a href='{{.UnsubscribeUrl}}'>配信停止</a></small>
            title:
                other: '[{{.SiteName}}] {{.DisplayName}} があなたを回答に招待しました'
        new_answer:
            body:
                other: |-
                    <a href='{{.AnswerUrl}}'>{{.QuestionTitle}}</a><br><br>

                    {{.DisplayName}}:<br>
                    <blockquote>{{.AnswerSummary}}</blockquote><br>
                    <a href='{{.AnswerUrl}}'>{{.SiteName}}で確認</a><br><br>

                    --<br>
                    注: これはシステムからの自動メールです。このメッセージに返信しないでください。<br><br>

                    <small><a href='{{.UnsubscribeUrl}}'>Unsubscribe</a></small>
            title:
                other: '[{{.SiteName}}] {{.DisplayName}} があなたの質問に回答しました'
        new_comment:
            body:
                other: |-
                    <a href='{{.CommentUrl}}'>{{.QuestionTitle}}</a><br><br>

                    {{.DisplayName}}:<br>
                    <blockquote>{{.CommentSummary}}</blockquote><br>
                    <a href='{{.CommentUrl}}'>で確認{{.SiteName}}</a><br><br>

                    --<br>
                    注: これはシステムからの自動メールです。このメッセージに返信しないでください。<br><br>

                    <small><a href='{{.UnsubscribeUrl}}'>配信停止</a></small>
            title:
                other: '[{{.SiteName}}] {{.DisplayName}} があなたの投稿にコメントしました'
        new_question:
            body:
                other: |-
                    <a href='{{.QuestionUrl}}'>{{.QuestionTitle}}</a><br>
                    <small>{{.Tags}}</small><br><br>

                    --<br>
                    注: これはシステムから送信される自動メールです。ご返信いただいても返信は表示されませんので、ご返信はご遠慮ください。<br><br>

                    <small><a href='{{.UnsubscribeUrl}}'>購読解除</a></small>
            title:
                other: '[{{.SiteName}}] 新しい質問： {{.QuestionTitle}}'
        pass_reset:
            body:
                other: |
                    {{.SiteName}}であなたのパスワードをリセットしようとしました。<br><br>

                    もしお心当たりがない場合は、このメールを無視してください。<br><br>

                    新しいパスワードを設定するには、以下のリンクをクリックしてください。<br>
                    <a href='{{.PassResetUrl}}' target='_blank'>{{.PassResetUrl}}</a>

                    --<br>
                    注: これはシステムからの自動メールです。このメッセージに返信しないでください。<br><br>
            title:
                other: '[{{.SiteName }}] パスワードリセット'
        register:
            body:
                other: |-
                    {{.SiteName}}へようこそ！<br><br>

                    以下のリンクをクリックして、新しいアカウントを確認・有効化してください。<br>
                    <a href='{{.RegisterUrl}}' target='_blank'>{{.RegisterUrl}}</a><br><br>

                    上記のリンクがクリックできない場合は、リンクをコピーしてブラウザのアドレスバーに貼り付けてみてください。

                    --<br>
                    注: これはシステムからの自動メールです。このメッセージに返信しないでください。<br><br>
            title:
                other: '[{{.SiteName}}] 新しいアカウントを確認'
        test:
            body:
                other: |-
                    これはテストメールです。
                    <br><br>

                    --<br>
                    注: これはシステムからの自動メールです。このメッセージに返信しないでください。<br><br>
            title:
                other: '[{{.SiteName}}] テストメール'
