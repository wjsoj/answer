version: "3"
services:
  answer:
    image: git.pku.edu.cn/2200011523/answer:latest
    container_name: answer-prod
    ports:
      - '9080:80'
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - answer-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "com.apache.answer.version=2.0.0"
      - "com.apache.answer.mcp=enabled"

volumes:
  answer-data:
